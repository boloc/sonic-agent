modules:
  android:
    scrcpy:
      # Encoded video long side. 720 keeps 720P-class quality.
      max-size: 720
      # Frame rate cap.
      max-fps: 45
      # h264 is more compatible; h265 may save bandwidth on supported devices.
      video-codec: h264
      # Target encoder bitrate in bit/s.
      video-bit-rate: 3000000
      # Smaller queue reduces latency; too small may drop frames.
      queue-size: 60
  ios:
    wda-bundle-id: com.sonic.WebDriverAgentRunner
    wda-xcode-project-path: WebdriverAgent/WebDriverAgent.xcodeproj
